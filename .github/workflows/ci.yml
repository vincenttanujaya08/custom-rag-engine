name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pure-Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ --count --max-complexity=10 --max-line-length=120 \
            --ignore=E402,W503 --statistics

      - name: Run pytest (core math, pruner, schemas)
        run: |
          pytest tests/ -v --tb=short
