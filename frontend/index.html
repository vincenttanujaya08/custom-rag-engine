<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom RAG Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #chat-messages { scroll-behavior: smooth; }
    .msg-user { background: #3b82f6; color: white; align-self: flex-end; }
    .msg-bot  { background: #374151; color: #e5e7eb; align-self: flex-start; }
    #debug-panel { max-height: calc(100vh - 7rem); overflow-y: auto; }
    .chunk-item { border-left: 3px solid #10b981; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col">
  <header class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center justify-between shrink-0">
    <h1 class="text-lg font-semibold">Custom RAG Engine</h1>
    <span id="status-badge" class="text-xs bg-yellow-600 px-2 py-0.5 rounded-full">connecting...</span>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <main class="flex-1 flex flex-col min-w-0">
      <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3 flex flex-col"></div>
      <form id="chat-form" class="border-t border-gray-700 p-3 flex gap-2 shrink-0">
        <input id="query-input" type="text" placeholder="Ask a question..." class="flex-1 bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500" autofocus>
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm font-medium disabled:opacity-50">Send</button>
      </form>
    </main>

    <aside id="debug-panel" class="w-80 bg-gray-850 border-l border-gray-700 p-4 hidden lg:block shrink-0">
      <h2 class="text-sm font-semibold uppercase tracking-wide text-gray-400 mb-3">Debug Info</h2>
      <div id="debug-content">
        <p class="text-xs text-gray-500">Submit a query to see retrieval details.</p>
      </div>
    </aside>
  </div>

  <script src="/app.js"></script>
</body>
</html>
